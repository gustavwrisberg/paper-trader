name: Paper Trader

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 10 min, Mon-Fri, 09:30-17:00 US Eastern (14:30-22:00 UTC)
    - cron: "*/10 14-21 * * 1-5"
    - cron: "0,10,20,30,40,50 22 * * 1-5"
  workflow_dispatch:
    inputs:
      force_rebalance:
        description: 'Force rebalance on all strategies (use for manual/reset runs)'
        required: false
        default: 'true'

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      STRATEGY: daily
      FORCE_REBALANCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebalance == 'true' && '1' || '0' }}
      GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:            ${{ secrets.EMAIL_TO }}
      TWILIO_SID:     ${{ secrets.TWILIO_SID }}
      TWILIO_TOKEN:   ${{ secrets.TWILIO_TOKEN }}
      TWILIO_FROM:    ${{ secrets.TWILIO_FROM }}
      TWILIO_TO:      ${{ secrets.TWILIO_TO }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python trader.py
      - name: Commit daily data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update daily data" || echo "No changes"
          git push

  weekly:
    runs-on: ubuntu-latest
    needs: daily
    env:
      STRATEGY: weekly
      FORCE_REBALANCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebalance == 'true' && '1' || '0' }}
      GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:            ${{ secrets.EMAIL_TO }}
      TWILIO_SID:     ${{ secrets.TWILIO_SID }}
      TWILIO_TOKEN:   ${{ secrets.TWILIO_TOKEN }}
      TWILIO_FROM:    ${{ secrets.TWILIO_FROM }}
      TWILIO_TO:      ${{ secrets.TWILIO_TO }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: git pull --rebase
      - run: python trader.py
      - name: Commit weekly data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update weekly data" || echo "No changes"
          git push

  monthly:
    runs-on: ubuntu-latest
    needs: weekly
    env:
      STRATEGY: monthly
      FORCE_REBALANCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebalance == 'true' && '1' || '0' }}
      GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:            ${{ secrets.EMAIL_TO }}
      TWILIO_SID:     ${{ secrets.TWILIO_SID }}
      TWILIO_TOKEN:   ${{ secrets.TWILIO_TOKEN }}
      TWILIO_FROM:    ${{ secrets.TWILIO_FROM }}
      TWILIO_TO:      ${{ secrets.TWILIO_TO }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: git pull --rebase
      - run: python trader.py
      - name: Commit monthly data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update monthly data" || echo "No changes"
          git push

  dashboard:
    runs-on: ubuntu-latest
    needs: monthly
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: git pull --rebase
      - run: python generate_dashboard.py
      - name: Commit dashboard
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "Update dashboard" || echo "No changes"
          git push
